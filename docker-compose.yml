services:
  # Production service
  nhs-triage-sim:
    build:
      context: .
      target: main
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./output:/app/output

  # Debug service with hot reload
  nhs-triage-sim-debug:
    build:
      context: .
      target: debug
    environment:
      - PYTHONPATH=/app
    ports:
      - "5678:5678"  # Expose debugger port
    volumes:
      - ./output:/app/output
      - ./src:/app/src  # Mount source for hot reload
    stdin_open: true
    tty: true