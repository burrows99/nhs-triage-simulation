version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: dissertation-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    networks:
      - ollama-network

  ollama-downloader:
    image: curlimages/curl:latest
    container_name: dissertation-ollama-downloader
    depends_on:
      - ollama
    command: >
      sh -c "
        echo 'Waiting for Ollama to be ready...'
        while ! curl -f http://ollama:11434/api/tags; do
          echo 'Ollama not ready, waiting 5 seconds...'
          sleep 5
        done
        echo 'Ollama is ready, downloading model...'
        curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2:1b\"}'
        echo 'Model download completed'
      "
    networks:
      - ollama-network

  simulation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dissertation-simulation
    depends_on:
      - ollama
      - ollama-downloader
    volumes:
      - ./output:/app/output
      - ./src:/app/src
    environment:
      - PYTHONPATH=/app
      - OLLAMA_BASE_URL=http://ollama:11434
    networks:
      - ollama-network
    command: python3 test_all_triage_systems.py

volumes:
  ollama_data:

networks:
  ollama-network:
    driver: bridge