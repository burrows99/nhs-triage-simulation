services:
  ollama:
    image: ollama/ollama:latest
    container_name: dissertation-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    networks:
      - ollama-network

  ollama-downloader:
    image: curlimages/curl:latest
    container_name: dissertation-ollama-downloader
    depends_on:
      ollama:
        condition: service_started
    command: >
      sh -c "
        echo 'Waiting for Ollama to be ready...'
        while ! curl -f http://ollama:11434/api/tags; do
          echo 'Ollama not ready, waiting 5 seconds...'
          sleep 5
        done
        echo 'Ollama is ready, downloading model...'
        curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2:1b\"}' --max-time 1800
        echo 'Model download completed'
      "
    networks:
      - ollama-network
    restart: "no"

  simulation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dissertation-simulation
    depends_on:
      ollama:
        condition: service_started
      ollama-downloader:
        condition: service_completed_successfully
    volumes:
      - ./output:/app/output
      - ./src:/app/src
    environment:
      - PYTHONPATH=/app
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:1b
    networks:
      - ollama-network
    restart: "no"
    command: python3 src/main.py

volumes:
  ollama_data:

networks:
  ollama-network:
    driver: bridge